# ─────────────────────────────────────────────────────────────
# SonarCloud Configuration — SmartSure Insurance Management System
# ─────────────────────────────────────────────────────────────
sonar.projectKey=Vadlamudi-Puneeth_SmartSure-Insurance-Management-System
sonar.organization=vadlamudi-puneeth

sonar.projectName=SmartSure Insurance Management System
sonar.projectVersion=1.0

# ── Source & Test roots (comma-separated) ──────────────────
sonar.sources=\
  backend/admin-service/src/main/java,\
  backend/auth-service/src/main/java,\
  backend/claims-service/src/main/java,\
  backend/payment-service/src/main/java,\
  backend/policy-service/src/main/java,\
  backend/notification-service/src/main/java,\
  backend/api-gateway/src/main/java,\
  backend/eureka-server/src/main/java,\
  backend/config-server/src/main/java,\
  frontend/src

sonar.tests=\
  backend/admin-service/src/test/java,\
  backend/auth-service/src/test/java,\
  backend/claims-service/src/test/java,\
  backend/payment-service/src/test/java,\
  backend/policy-service/src/test/java,\
  backend/notification-service/src/test/java,\
  backend/api-gateway/src/test/java,\
  backend/eureka-server/src/test/java,\
  backend/config-server/src/test/java

# ── Java config ────────────────────────────────────────────
sonar.java.binaries=\
  backend/admin-service/target/classes,\
  backend/auth-service/target/classes,\
  backend/claims-service/target/classes,\
  backend/payment-service/target/classes,\
  backend/policy-service/target/classes,\
  backend/notification-service/target/classes,\
  backend/api-gateway/target/classes,\
  backend/eureka-server/target/classes,\
  backend/config-server/target/classes

sonar.java.libraries=\
  backend/admin-service/target/dependency/*.jar,\
  backend/auth-service/target/dependency/*.jar,\
  backend/claims-service/target/dependency/*.jar,\
  backend/payment-service/target/dependency/*.jar,\
  backend/policy-service/target/dependency/*.jar,\
  backend/notification-service/target/dependency/*.jar,\
  backend/api-gateway/target/dependency/*.jar

# ── JaCoCo coverage reports (XML format) ──────────────────
sonar.coverage.jacoco.xmlReportPaths=\
  backend/admin-service/target/site/jacoco/jacoco.xml,\
  backend/auth-service/target/site/jacoco/jacoco.xml,\
  backend/claims-service/target/site/jacoco/jacoco.xml,\
  backend/payment-service/target/site/jacoco/jacoco.xml,\
  backend/policy-service/target/site/jacoco/jacoco.xml,\
  backend/notification-service/target/site/jacoco/jacoco.xml,\
  backend/api-gateway/target/site/jacoco/jacoco.xml

# ── Exclusions (match JaCoCo excludes) ─────────────────────
sonar.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/config/**,\
  **/*Application.java,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**

# ── Encoding & Java Version ────────────────────────────────
sonar.sourceEncoding=UTF-8
sonar.java.source=17
sonar.java.target=17
